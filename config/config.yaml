paths:
  project_root: ..
  data_root: data
  celeba_root: data/celeba
  image_dir: data/celeba/img_align_celeba
  identity_file: data/celeba/identity_CelebA.txt
  flow_cache_dir: data/flow_cache
  checkpoints_dir: checkpoints
  runs_dir: runs

dataset:
  image_size: 64
  image_channels: 3
  fake_ratio: 0.5
  train_split: 0.8034284473269854
  val_split: 0.09806168835976585
  test_split: 0.09850986431324883
  gaussian_noise_std: 0.05
  expected_image_count: 202599
  expected_native_width: 178
  expected_native_height: 218

dataloader:
  batch_size: 64
  num_workers: 2
  prefetch_factor: 2
  pin_memory: false
  drop_last: false

forensics:
  face_align: mtcnn
  align_margin: 0.25
  cache_dir: data/forensics_aligned
  fallback: center_crop
  pairing_mode: degenerate
  threshold_dir: runs/forensics_threshold

training:
  epochs: 100
  learning_rate: 0.0002
  optimizer: adam
  betas:
    - 0.5
    - 0.999
  scheduler: CosineAnnealingLR
  scheduler_t_max: 100
  dropout: 0.3
  checkpoint_metric: balanced_accuracy
  seed: 42
  checkpoint_name: phase1_branch_a_best.pt
  early_stopping:
    patience_overfit: 5
    patience_ceiling: 3
    warmup_epochs: 3
    val_loss_ceiling: 0.35
    enable_loss_ceiling: true

phase2:
  epochs: 20
  learning_rate: 0.00015
  backbone_train_last_n: 2
  backbone_lr_scale: 0.1
  optimizer: adam
  betas:
    - 0.5
    - 0.999
  scheduler: CosineAnnealingLR
  scheduler_t_max: 15
  dropout: 0.4
  weight_decay: 0.0001
  checkpoint_metric: balanced_accuracy
  seed: 42
  checkpoint_name: phase2_a_b.pt
  pretrained_branch_a: phase1_branch_a_best.pt
  targets:
    balanced_accuracy: 0.88
    f1: 0.88
  early_stopping:
    patience_overfit: 5
    patience_ceiling: 3
    patience_val_metric: 4
    val_metric: balanced_accuracy
    warmup_epochs: 3
    val_loss_ceiling: 0.40
    enable_loss_ceiling: true

phase3:
  epochs: 20
  device: mps
  learning_rate: 0.0002
  optimizer: adam
  betas:
    - 0.5
    - 0.999
  scheduler: CosineAnnealingLR
  scheduler_t_max: 20
  dropout: 0.3
  seed: 42
  checkpoint_name: phase3_a_b_c.pt
  pretrained_phase2: phase2_a_b.pt
  pairing_mode: adjacent_cache
  include_flow: true
  dataloader:
    num_workers: 2
  targets:
    balanced_accuracy: 0.83
    f1: 0.80
  early_stopping:
    patience_overfit: 5
    val_loss_ceiling: 0.45

phase4:
  epochs: 30
  device: mps
  learning_rate: 0.00005
  optimizer: adam
  betas:
    - 0.5
    - 0.999
  scheduler: CosineAnnealingLR
  scheduler_t_max: 30
  dropout: 0.3
  seed: 42
  checkpoint_name: phase4_ensemble.pt
  pretrained_phase3: phase3_a_b_c.pt
  fusion_contract: "2108"
  fusion_dim: 2108
  branch_dims:
    a: 2048
    b: 32
    c: 28
  loss:
    bce_weight: 0.7
    hinge_weight: 0.3
    real_weight: 1.5
    fake_weight: 1.0
    margin: 0.8
  staged_unfreezing:
    enabled: true
    fusion_epochs: 10
    branches_bc_epochs: 10
    branch_a_train_last_n: 2
    fusion_lr: 0.00005
    branches_bc_lr: 0.00002
    branch_a_lr: 0.000005
  pairing_mode: adjacent_cache
  include_flow: true
  dataloader:
    num_workers: 2
  targets:
    balanced_accuracy: 0.944
    f1: 0.93
  early_stopping:
    patience_overfit: 5
    patience_ceiling: 3
    patience_val_metric: 4
    val_metric: balanced_accuracy
    warmup_epochs: 3
    val_loss_ceiling: 0.45
    enable_loss_ceiling: true
